<!DOCTYPE html>

<html lang="es">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Calculadora_2</title>
        <link rel="stylesheet" href="style_funciones.css"/>
    </head>

    <body>

    <div class="container">
        <div class="display">
            <input type="text" id="resultado" readonly value="0" />
        </div>
        <div class="botones">
            <button class="operador cls" onclick="manejarClick('C')">C</button>
            <button class="operador"     onclick="manejarClick('←')">←</button>
            <button class="operador"     onclick="manejarClick('%')">%</button>
            <button class="operador"     onclick="manejarClick('/')">/</button>

            <button class="numero" onclick="manejarClick('7')">7</button>
            <button class="numero" onclick="manejarClick('8')">8</button>
            <button class="numero" onclick="manejarClick('9')">9</button>
            <button class="operador" onclick="manejarClick('*')">×</button>

            <button class="numero" onclick="manejarClick('4')">4</button>
            <button class="numero" onclick="manejarClick('5')">5</button>
            <button class="numero" onclick="manejarClick('6')">6</button>
            <button class="operador" onclick="manejarClick('-')">-</button>

            <button class="numero" onclick="manejarClick('1')">1</button>
            <button class="numero" onclick="manejarClick('2')">2</button>
            <button class="numero" onclick="manejarClick('3')">3</button>
            <button class="operador" onclick="manejarClick('+')">+</button>

            <button class="numero"         onclick="manejarClick('0')">0</button>
            <button class="numero"         onclick="manejarClick('.')">.</button>
            <button class="operador igual" onclick="manejarClick('=')">=</button>
        </div>
    </div>

    <script src="app_funciones.js"></script>

    </body>

</html>
